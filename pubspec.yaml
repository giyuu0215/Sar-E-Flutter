name: sare
description: "Sar-E – Smart POS & Store Manager for Filipino sari-sari stores."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  google_fonts: ^6.2.1
  dynamic_color: ^1.7.0
  qr_flutter: ^4.1.0

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage (offline-first)
  sqflite: ^2.4.2
  path: ^1.9.0

  # Crypto / security
  crypto: ^3.0.6
  uuid: ^4.5.1

  # Firebase (cloud sync)
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6

  # Network
  connectivity_plus: ^6.1.4

  # PDF export
  pdf: ^3.11.3
  printing: ^5.14.2

  # Persistence (app settings)
  shared_preferences: ^2.5.5

  # Formatting
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  sqflite_common_ffi: ^2.4.0+3
  sqflite_common_ffi_web: ^1.1.1
  url_launcher: ^6.3.2
  firebase_auth: ^5.7.0
  google_sign_in: ^7.2.0
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/sare_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/sare_logo.png
  adaptive_icon_foreground: assets/images/sare_logo.png
  adaptive_icon_background: '#FFFFFF'
  web:
    generate: true
    image_path: assets/images/sare_logo.png
    background_color: '#FFFFFF'
    theme_color: '#C9352C'
  windows:
    generate: true
    image_path: assets/images/sare_logo.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/images/sare_logo.png

